<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Records</title>
    <link rel="stylesheet" href="https://unpkg.com/tabulator-tables@4.9.3/dist/css/tabulator.min.css">
    <script defer src="//unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="//cdnjs.cloudflare.com/ajax/libs/numeral.js/2.0.6/numeral.min.js"></script>
    <script type="text/javascript" src="https://unpkg.com/tabulator-tables@4.9.3/dist/js/tabulator.min.js"></script>
    <!-- js library pretty print json -->
    <link rel=stylesheet href=https://cdn.jsdelivr.net/npm/pretty-print-json@1.0/dist/pretty-print-json.css>
    <script src=https://cdn.jsdelivr.net/npm/pretty-print-json@1.0/dist/pretty-print-json.min.js></script>
    <link rel="stylesheet" href="/static/css/common.css"/>
    <script type="text/javascript" src="/static/js/common.js"></script>
    <script type="text/javascript" src="/static/js/records.js"></script>
    <style>
        #records {
            height: 40vh;
        }

        input, button, .tabulator, .tabulator-footer {
            font-size: 0.7rem;
        }

        .infoContainer {
            display: flex;
            flex-direction: row;
            height: calc(100% - 25px);
            height: -moz-calc(100% - 25px);
            height: -webkit-calc(100% - 25px);
            box-sizing: border-box;
            border-top: 1px solid;
        }

        .infoChild {
            width: 50%;
            height: 100%;
            background-color: white;
        }

        div.infoChild pre {
            padding-top: 0;
            padding-left: 0;
            padding-bottom: 0;
            padding-right: 0;
        }

        .tabulator {
            font-family: var(--mono-font);
            vertical-align: auto;
        }

        .tabulator-row .tabulator-cell{
            padding:0 4px;
        }

        .tabulator-row-even {
            background: #ffffff;
        }
        .tabulator-row-odd {
            background: #ffffff;
        }


    </style>
</head>
<body onload="onLoad()">
<main>
    <header>
    <a href="https://github.com/isamplesorg" class="github-corner" aria-label="View source on GitHub">
        <svg width="80" height="80" viewBox="0 0 250 250"
             style="fill:#151513; color:#fff; position: absolute; top: 0; border: 0; right: 0;" aria-hidden="true">
            <path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z"></path>
            <path d="M128.3,109.0 C113.8,99.7 119.0,89.6 119.0,89.6 C122.0,82.7 120.5,78.6 120.5,78.6 C119.2,72.0 123.4,76.3 123.4,76.3 C127.3,80.9 125.5,87.3 125.5,87.3 C122.9,97.6 130.6,101.9 134.4,103.2"
                  fill="currentColor" style="transform-origin: 130px 106px;" class="octo-arm"></path>
            <path d="M115.0,115.0 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,88.0 127.5,74.4 143.8,58.0 C148.5,53.4 154.0,51.2 159.7,51.0 C160.3,49.4 163.2,43.6 171.4,40.1 C171.4,40.1 176.1,42.5 178.8,56.2 C183.1,58.6 187.2,61.8 190.9,65.4 C194.5,69.0 197.7,73.2 200.1,77.6 C213.8,80.2 216.3,84.9 216.3,84.9 C212.7,93.1 206.9,96.0 205.4,96.6 C205.1,102.4 203.0,107.8 198.3,112.5 C181.9,128.9 168.3,122.5 157.7,114.1 C157.9,116.9 156.7,120.9 152.7,124.9 L141.0,136.5 C139.8,137.7 141.6,141.9 141.8,141.8 Z"
                  fill="currentColor" class="octo-body"></path>
        </svg>
    </a>

    </header>
    <details id="query_display" x-data="queryParams()"
             x-on:query-changed.window="update($event);"
             x-on:spatial-bb-changed.window="setBB($event)">
        <summary>Current queries</summary>
        <div class="data queryinfo">&nbsp;Q: <input class="query" id="query" @keyup.enter="setQ($el.value)"
                                                    :value="q"></input></div>
        <div class="data queryinfo">FQ: <span class="query" x-text="fq"></span></div>
        <div class="data queryinfo">BB: <input type="checkbox" x-model="follow_bb"/><span class="query"
                                                                                          x-text="bb"></span></div>
    </details>
    <section>
        <div id="records"></div>
    </section>
    <section class="infoContainer">
        <div class="infoChild" id="InfoLeft">
            <span class="label">Original</span>
            <pre id="record_original"></pre>
        </div>
        <div class="infoChild" id="InfoRight">
            <span class="label">Core</span>
            <pre id="record_xform"></pre>
        </div>
    </section>
</main>
<footer x-data="siteInfo()">
    <p x-text="_info"></p>
</footer>
</body>
</html>
